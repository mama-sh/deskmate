name: release-please

# Versioning is automated with Release Please (https://github.com/googleapis/release-please).
# On every push to main it reads the Conventional Commits since the last release and
# maintains a single "release PR" that bumps the version in package.json and updates
# CHANGELOG.md. Merging that PR tags vX.Y.Z and publishes a GitHub Release.
#
# One-time repo setting required for the Action to open the release PR:
#   Settings → Actions → General → Workflow permissions →
#   enable "Allow GitHub Actions to create and approve pull requests".

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Pinned to a full commit SHA for supply-chain safety + reproducible runs.
      # Bump the SHA (and the version comment) when upgrading the action.
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
